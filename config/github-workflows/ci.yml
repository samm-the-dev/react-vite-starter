# CI workflow for Node.js projects
# Runs lint, tests, and build on PRs and main branch pushes

name: CI

on:
  pull_request:
    branches: ['*']
    paths-ignore:
      - '**.md'
      - 'LICENSE*'
      - '.gitignore'
      - '.vscode/**'

  push:
    branches: ['main']

  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
